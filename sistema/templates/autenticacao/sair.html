<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Até logo! - SysEmpréstimos</title>
  <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport" />
  <link rel="icon" href="{{ url_for('static', filename='images/kaiadmin/favicon.ico') }}" type="image/x-icon" />

  <!-- Fonts and icons -->
  <script src="{{ url_for('static', filename='js/plugin/webfont/webfont.min.js') }}"></script>
  <script>
    WebFont.load({
      google: { families: ["Public Sans:300,400,500,600,700"] },
      custom: {
        families: ["Font Awesome 5 Solid", "Font Awesome 5 Regular", "Font Awesome 5 Brands", "simple-line-icons"],
        urls: ["{{ url_for('static', filename='css/fonts.min.css') }}"],
      },
      active: function () {
        sessionStorage.fonts = true;
      },
    });
  </script>

  <!-- CSS Files -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kaiadmin.min.css') }}" />

  <style>
    body.logout-page {
      background-image: url("{{ url_for('static', filename='images/imgsys-fundologin.jpg') }}");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
  </style>
</head>

<body class="logout-page">
  <div class="card text-center p-5 shadow-lg" style="max-width: 450px; border-radius: 15px;">
    <div class="mb-4">
      <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
    </div>
    <h2 class="fw-bold mb-3">Você saiu com sucesso!</h2>
    <p class="text-muted mb-4">Sua sessão foi encerrada. Esperamos vê-lo novamente em breve.</p>
    <a href="{{ url_for('login') }}" class="btn btn-primary w-100 fw-bold">
      <i class="fas fa-sign-in-alt me-2"></i> Ir para Login
    </a>
  </div>
</body>

</html>
